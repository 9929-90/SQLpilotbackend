spring.application.name=${SPRING_APPLICATION_NAME}

# ---------------- DATABASE ----------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aiquery}?sslmode=require
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Ashwatthama09@@&&**}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ---------------- JPA ----------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ---------------- FLYWAY ----------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ---------------- REDIS ----------------
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms

spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1

# ---------------- CACHE ----------------
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# ---------------- SERVER ----------------
server.port=${SERVER_PORT:8081}
server.servlet.context-path=/

server.compression.enabled=true

server.error.include-message=never
server.error.include-binding-errors=never

# ---------------- JWT ----------------
jwt.secret=${JWT_SECRET:defaultSecretKeyForDev}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ---------------- GEMINI ----------------
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL}
gemini.api.timeout=${GEMINI_API_TIMEOUT}
gemini.api.max-retries=${GEMINI_API_MAX_RETRIES}

# ---------------- QUERY EXECUTION ----------------
query.execution.max-rows=${QUERY_MAX_ROWS}
query.execution.timeout-seconds=${QUERY_TIMEOUT_SECONDS}

# ---------------- SWAGGER ----------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.default-produces-media-type=application/json

# ---------------- ACTUATOR ----------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ---------------- LOGGING ----------------
logging.level.com.aiquery=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n